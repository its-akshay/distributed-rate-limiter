apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter

spec:
  replicas: 4

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: rate-limiter

  template:
    metadata:
      labels:
        app: rate-limiter

    spec:
      containers:
        - name: rate-limiter

          image: distributed-rate-limiter:latest
          imagePullPolicy: Never

          envFrom:
            - configMapRef:
                name: rate-limiter-config

          ports:
            - containerPort: 8080

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"
